name: Automated Tests

on: pull_request

jobs:
  vitest:
    name: Vitest
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: DATABASE_URL=postgres://catalog_user:catalog_password@localhost:5432/catalog?schema=local

    strategy:
      matrix:
        node-version: [20, 24]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Start Database
      - run: npm run services:database:up

      - name: Wait fot database
        run: sleep 10

      - name: Generate Prisma Client
      - name: npm run prisma:generate

      - name: Run Jest tests
        run: npm run test
