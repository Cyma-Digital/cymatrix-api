name: CI & Deploy

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

env:
  DATABASE_URL: DATABASE_URL=postgres://catalog_user:catalog_password@localhost:5432/catalog?schema=local

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint:eslint
      - run: npm run lint:prettier:check

  tests:
    name: Tests
    runs-on: ubuntu-lastest
    needs: lint

    strategy:
      matrix:
        node-version: [20, 24]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: catalog_user
          POSTGRES_PASSWORD: catalog_password
          POSTGRES_DB: catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run Migrations
        run: npm run prisma:migrations:deploy

      - name: Run Vitest Tests
        run: npm run test
