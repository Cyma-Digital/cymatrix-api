name: name CI & Deploy

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

env:
  DATABASE_URL: DATABASE_URL=postgres://catalog_user:catalog_password@localhost:5432/catalog?schema=local

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint:eslint
      - run: npm run lint:prettier:check
