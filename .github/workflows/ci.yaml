name: CI & Deploy

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

env:
  DATABASE_URL: postgres://catalog_user:catalog_password@localhost:5432/catalog?schema=local
  POSTGRES_SCHEMA: local
  ACCESS_TOKEN_SECRET: ca3e339d298b0d9dd17329eab6f279ca4666dfdfd5b36ab93057ca52e0445b40
  REFRESH_TOKEN_SECRET: 6a77b8fe98d2b71a68d101ddb6b72c5d15f32c1a8a9f6848207ab3dbcd4b15cd

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint:eslint
      - run: npm run lint:prettier:check

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        node-version: [20, 24]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: catalog_user
          POSTGRES_PASSWORD: catalog_password
          POSTGRES_DB: catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run Migrations
        run: npm run prisma:migrations:deploy

      - name: Run Vitest Tests
        run: npm run test
